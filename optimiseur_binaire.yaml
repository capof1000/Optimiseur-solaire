blueprint:
  name: Optimisateur d'auto-consommation v2
  description: >
    Allume/éteint un équipement selon le surplus solaire.
    Réévalue à chaque changement de consommation nette OU de consommation
    de l'équipement — corrige le bug du thermostat qui repart sans déclencher de transition.
  domain: automation

  input:
    net_consumption:
      name: Consommation nette (W)
      description: Capteur de puissance nette (négatif = surplus solaire)
      selector:
        entity:
          domain: sensor
          device_class: power

    equipment_switch:
      name: Équipement à contrôler
      selector:
        entity:
          domain:
            - switch
            - input_boolean

    equipment_power:
      name: Puissance consommée par l'équipement (W)
      selector:
        entity:
          domain: sensor
          device_class: power

    offset:
      name: Offset à l'allumage (W)
      description: >
        Seuil de surproduction pour allumer l'équipement.
        Entrez -200 pour démarrer quand la surproduction atteint 200 W.
      default: -50
      selector:
        number:
          min: -1000
          max: 0
          step: 1
          unit_of_measurement: "W"

    delay_off:
      name: Délai avant extinction (secondes)
      description: >
        Durée pendant laquelle la condition d'extinction doit être vraie
        avant d'éteindre l'équipement. Évite les coupures sur nuage passager.
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          step: 1
          unit_of_measurement: "s"

    trigger_threshold:
      name: Seuil de variation pour déclencher (W)
      description: >
        Ignore les micro-variations de capteur inférieures à cette valeur.
        Recommandé : 20-50 W pour éviter les déclenchements intempestifs.
      default: 30
      selector:
        number:
          min: 0
          max: 200
          step: 5
          unit_of_measurement: "W"

# mode single : si une évaluation est déjà en cours (ex: délai OFF),
# on l'annule et on repart sur la nouvelle valeur mesurée
mode: restart

trigger:
  # Réévalue dès que la conso nette change significativement
  - platform: state
    entity_id: !input net_consumption
    id: recheck

  # Réévalue dès que l'équipement change de consommation
  # (ex: thermostat qui repart → la logique détecte l'absence de solaire)
  - platform: state
    entity_id: !input equipment_power
    id: recheck

variables:
  net_entity: !input net_consumption
  equip_entity: !input equipment_power
  switch_entity: !input equipment_switch
  offset_value: !input offset
  delay_off_sec: !input delay_off
  threshold: !input trigger_threshold

  # Valeurs courantes
  net_power: "{{ states(net_entity) | float(0) }}"
  equip_power: "{{ states(equip_entity) | float(0) }}"
  switch_state: "{{ states(switch_entity) }}"

condition:
  # Ignore si les valeurs sont indisponibles
  - condition: template
    value_template: >
      {{ states(net_entity) not in ['unknown', 'unavailable']
         and states(equip_entity) not in ['unknown', 'unavailable'] }}

action:
  - choose:

      # ✅ CAS 1 — Surplus suffisant → allumer (si pas déjà allumé)
      - conditions:
          - condition: template
            value_template: "{{ net_power <= offset_value }}"
          - condition: template
            value_template: "{{ switch_state == 'off' }}"
        sequence:
          - service: homeassistant.turn_on
            target:
              entity_id: "{{ switch_entity }}"

      # ⛔ CAS 2 — Pas assez de solaire → éteindre après délai (si allumé)
      - conditions:
          - condition: template
            value_template: "{{ net_power > offset_value | abs - threshold }}"
          - condition: template
            value_template: "{{ switch_state == 'on' }}"
        sequence:
          - delay:
              seconds: "{{ delay_off_sec }}"
          # Réévalue une dernière fois après le délai
          # (le surplus a peut-être repris entre temps)
          - condition: template
            value_template: "{{ states(net_entity) | float(0) > offset_value | abs - threshold }}"
          - service: homeassistant.turn_off
            target:
              entity_id: "{{ switch_entity }}"
