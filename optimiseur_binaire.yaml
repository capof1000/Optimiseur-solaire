blueprint:
  name: Optimisateur d'auto-consommation v3.2
  description: >
    Allume/éteint un équipement selon le surplus solaire.

    v1 — Logique de base :
      - Allumage immédiat sur surplus (net_consumption < StartupValue)
      - Extinction après délai si import réseau (net_consumption > equipment_power)

    v2 — Tentative approche "trigger large + logique dans l'action" :
      - Abandonné : délai OFF fragilisé par mode restart, trop de déclenchements

    v3 — Hybride (version actuelle) :
      - Conserve les triggers natifs HA de la v1 (robustesse du délai)
      - Ajoute trigger sur equipment_power pour détecter le redémarrage
        de thermostat sans transition sur net_consumption (correction du
        bug chauffe-eau : résistance repart la nuit sans déclencher d'extinction)
      - StopValue : seuil dédié au CAS 3 (redémarrage thermostat sans solaire)
      - Délai après allumage (CAS 1) pour éviter les cycles rapides
      - Chaque seuil a un rôle unique :
          StartupValue  → déclenchement allumage
          equipment_power → déclenchement extinction normale
          StopValue     → déclenchement extinction sur redémarrage thermostat

  domain: automation

  input:
    net_consumption:
      name: Consommation nette (W)
      description: Négatif = surplus solaire, positif = import réseau
      selector:
        entity:
          domain: sensor
          device_class: power

    equipment_switch:
      name: Équipement à contrôler
      selector:
        entity:
          domain:
            - switch
            - input_boolean

    equipment_power:
      name: Puissance consommée par l'équipement (W)
      description: >
        Capteur de puissance de l'équipement.
        Utilisé pour détecter le redémarrage du thermostat (trigger 3)
        et comme seuil d'extinction normale (trigger 2) :
        si net_consumption dépasse cette valeur, le solaire ne couvre
        plus du tout l'équipement.
      selector:
        entity:
          domain: sensor
          device_class: power

    StartupValue:
      name: Valeur d'allumage (W)
      description: >
        Consommation nette inférieure à cette valeur pour allumer l'équipement (valeur négative).
        Entrez -200 pour démarrer l'appareil lorsque la surproduction atteint 200W.
      default: -50
      selector:
        number:
          min: -1000
          max: 0
          step: 1
          unit_of_measurement: "W"

    StopValue:
      name: Valeur d'extinction (W)
      description: >
        Seuil utilisé uniquement pour le CAS 3 (redémarrage thermostat).
        Si net_consumption dépasse cette valeur au moment du redémarrage,
        l'équipement est éteint immédiatement.
        Exemple : +100W signifie "pas de solaire utile disponible".
      default: 100
      selector:
        number:
          min: 0
          max: 1000
          step: 10
          unit_of_measurement: "W"

    delay_on:
      name: Délai après allumage (secondes)
      description: >
        Temps d'attente après allumage avant de permettre un nouveau cycle.
        Evite les allumages/extinctions rapides au moment du démarrage.
      default: 60
      selector:
        number:
          min: 0
          max: 600
          step: 1
          unit_of_measurement: "s"

    delay_off:
      name: Délai avant extinction (secondes)
      description: >
        Durée pendant laquelle net_consumption doit dépasser equipment_power
        avant d'éteindre. Protège contre les baisses passagères (nuage, pic ponctuel).
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          step: 1
          unit_of_measurement: "s"

# mode restart : safe ici car tous les délais sont dans les triggers
# (gérés nativement par HA), pas dans les actions.
# Exception : le délai après allumage (CAS 1) est dans l'action,
# mais il est volontairement court et non critique.
mode: restart

trigger:

  # ─── TRIGGER 1 : SURPLUS → ALLUMAGE ─────────────────────────────
  # Se déclenche quand net_consumption franchit StartupValue vers le bas.
  # Pas de délai : on profite du surplus immédiatement.
  - platform: numeric_state
    entity_id: !input net_consumption
    below: !input StartupValue
    id: surplus_on

  # ─── TRIGGER 2 : IMPORT RÉSEAU SOUTENU → EXTINCTION ─────────────
  # Se déclenche quand net_consumption dépasse equipment_power pendant
  # toute la durée du délai configuré.
  # Logique : le solaire ne couvre plus du tout l'équipement → on éteint.
  # Le "for" est géré nativement par HA : résiste aux micro-fluctuations.
  - platform: numeric_state
    entity_id: !input net_consumption
    above: !input equipment_power
    for:
      seconds: !input delay_off
    id: grid_import_off

  # ─── TRIGGER 3 : THERMOSTAT QUI REPART → VÉRIFICATION ───────────
  # CORRECTION DU BUG : quand la résistance repart après une période
  # de veille, net_consumption ne fait aucune transition → trigger 2
  # ne se déclenche pas.
  # On surveille donc l'équipement lui-même : dès que sa consommation
  # remonte au dessus de 0, on réévalue la situation.
  # Le "for: 30s" évite les faux positifs sur variation de capteur.
  - platform: numeric_state
    entity_id: !input equipment_power
    above: 0
    for:
      seconds: 30
    id: thermostat_restart

variables:
  net_entity: !input net_consumption
  equip_entity: !input equipment_power
  switch_entity: !input equipment_switch

condition:
  # Bloque si les capteurs sont indisponibles
  # (coupure réseau, redémarrage HA, etc.)
  - condition: template
    value_template: >
      {{ states(net_entity) not in ['unknown', 'unavailable']
         and states(equip_entity) not in ['unknown', 'unavailable'] }}

action:
  - choose:

      # ══════════════════════════════════════════════════════════════
      # CAS 1 — SURPLUS SOLAIRE → ALLUMER
      # Déclenché par trigger 1 uniquement.
      # Délai après allumage pour éviter un cycle trop rapide :
      # lorsque l'équipement démarre, sa consommation s'ajoute à la
      # conso nette et pourrait immédiatement déclencher une extinction.
      # ══════════════════════════════════════════════════════════════
      - conditions:
          - condition: trigger
            id: surplus_on
          # Sécurité : évite un appel de service inutile si déjà allumé
          - condition: state
            entity_id: !input equipment_switch
            state: "off"
        sequence:
          - service: homeassistant.turn_on
            target:
              entity_id: "{{ switch_entity }}"
          # Pause pour laisser la consommation se stabiliser
          # avant d'autoriser un nouveau cycle
          - delay:
              seconds: !input delay_on

      # ══════════════════════════════════════════════════════════════
      # CAS 2 — IMPORT RÉSEAU SOUTENU → ÉTEINDRE
      # Déclenché par trigger 2. Le délai a déjà été tenu dans le
      # trigger, on éteint directement.
      # ══════════════════════════════════════════════════════════════
      - conditions:
          - condition: trigger
            id: grid_import_off
          # Sécurité : évite un appel de service inutile si déjà éteint
          - condition: state
            entity_id: !input equipment_switch
            state: "on"
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: "{{ switch_entity }}"

      # ══════════════════════════════════════════════════════════════
      # CAS 3 — THERMOSTAT REPART SANS SOLAIRE → ÉTEINDRE
      # Déclenché par trigger 3.
      # On utilise StopValue comme seuil de décision, indépendant de
      # equipment_power, pour ne pas éteindre un équipement qui vient
      # de démarrer en journée sur surplus solaire.
      #
      # Exemple :
      #   Jour  : net=-500W < StopValue(+100W) → condition fausse → ON maintenu ✅
      #   Nuit  : net=+300W > StopValue(+100W) → condition vraie  → OFF ✅
      # ══════════════════════════════════════════════════════════════
      - conditions:
          - condition: trigger
            id: thermostat_restart
          # L'équipement doit être allumé dans HA
          - condition: state
            entity_id: !input equipment_switch
            state: "on"
          # net_consumption dépasse StopValue → pas de solaire suffisant
          - condition: numeric_state
            entity_id: !input net_consumption
            above: !input StopValue
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: "{{ switch_entity }}"
